# Aurora Emulator - Android APK Build + Release
#
# Builds the APK on every push to main and creates a GitHub release.
# APK is uploaded as both an artifact (Actions UI) and a release asset.

name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.3.13750724" "cmake;3.22.1" || true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build modernDebug APK
        working-directory: android
        run: ./gradlew assembleModernDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/modern/debug/app-modern-debug.apk \
             Aurora-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-debug-apk
          path: Aurora-*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: Aurora v0.1.${{ github.run_number }}
          body: |
            ## Aurora Emulator — PC Gaming on Android

            ### Download
            Download `Aurora-*.apk` below and install on your Android phone.

            ### What's new
            - Full Box64 + Wine + DXVK integration
            - Aurora Mali Vulkan Sanitizer (10 rules)
            - AOT Texture Transcoder (Basis Universal)
            - Mesh LOD Simplification (meshoptimizer QEM)
            - Markov Predictive File Prefetcher
            - Per-Game Shader Cache
            - Auto-Installer (VC++/DirectX/PhysX/.NET)
            - Aurora settings tab in per-game config

            ### Requirements
            - Android 8.0+ (API 26+)
            - ARM64 device (arm64-v8a)
            - Adreno 6xx+ or Mali Valhall+ GPU

            ### How to install
            1. Download the APK
            2. Enable "Install from unknown sources" in Android settings
            3. Tap the APK file to install
            4. Launch Aurora and wait for initial setup
          files: Aurora-*.apk
          draft: false
          prerelease: true

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: android/app/build/reports/
          retention-days: 7
          if-no-files-found: warn
